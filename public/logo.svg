      <stop offset="0%" stop-color="#00d4ff"/>
      <stop offset="100%" stop-color="#a855f7"/>
    </linearGradient>
  </defs>
  <!-- Left weight plate -->
  <rect x="8" y="18" width="10" height="28" rx="3" fill="url(#g1)"/>
  <!-- Right weight plate -->
  <rect x="46" y="18" width="10" height="28" rx="3" fill="url(#g1)"/>
  <!-- Bar -->
  <rect x="16" y="28" width="32" height="8" rx="2" fill="url(#g1)" opacity="0.7"/>
  <!-- Inner left plate -->
